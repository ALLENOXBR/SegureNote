<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURE NOTE | Premium Security</title>
    <style>
        /* =========================================================================
           SISTEMA DE DESIGN (V5.2 - DELETE FIX & SECURITY)
           ========================================================================= */
        :root {
            --radius-main: 24px;
            --radius-card: 20px;
            --radius-btn: 10px;
            --font-main: 'Segoe UI Variable', 'Inter', system-ui, sans-serif;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --max-editor-width: 800px;
        }

        :root[data-theme="dark"] {
            --bg-color: #09090b; 
            --auth-bg: #020203;  
            --surface: #141416;
            --surface-hover: #1f1f23;
            --border: #27272a;
            --text: #f4f4f5;
            --text-muted: #71717a;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --danger: #ef4444;
            --card-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.8);
        }

        :root[data-theme="light"] {
            --bg-color: #f1f5f9; 
            --auth-bg: #cbd5e1;
            --surface: #ffffff;
            --surface-hover: #f8fafc;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #475569;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --danger: #dc2626;
            --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color); color: var(--text);
            display: flex; height: 100vh; overflow: hidden;
            transition: background-color 0.3s ease;
            font-size: 14px;
        }

        .screen { display: none; width: 100%; height: 100%; position: relative; }
        .screen.active { display: flex; }

        /* --- Notificações --- */
        .toast-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10000; display: flex; flex-direction: column; gap: 5px;
        }
        .toast {
            background: var(--surface); color: var(--text); border: 1px solid var(--accent);
            padding: 10px 22px; border-radius: 50px; font-weight: 700; font-size: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3); animation: toastIn 0.3s ease forwards;
            display: flex; align-items: center; gap: 8px;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Autenticação --- */
        .auth-container { 
            width: 100%; display: flex; flex-direction: column; background-color: var(--auth-bg);
            background-image: radial-gradient(circle at top right, rgba(245, 158, 11, 0.08), transparent 60%);
        }
        .auth-header { display: flex; justify-content: space-between; padding: 15px 30px; align-items: center; }
        .auth-center { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 15px; }
        
        .auth-card {
            background-color: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-card); padding: 35px; width: 100%; max-width: 380px;
            box-shadow: var(--card-shadow); text-align: center;
            animation: cardFadeIn 0.4s ease-out; position: relative;
        }
        @keyframes cardFadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .window-dots { display: flex; gap: 6px; position: absolute; top: 15px; left: 20px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; cursor: pointer; }
        .dot-red { background: #ff5f57; }
        .dot-yellow { background: #febc2e; }
        .dot-green { background: #28c840; }

        .input-group { margin-bottom: 15px; text-align: left; position: relative; }
        .input-group label { display: block; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .input-group input {
            background-color: var(--bg-color); border: 1px solid var(--border);
            color: var(--text); border-radius: 10px; padding: 12px 15px; width: 100%;
            font-size: 14px; font-weight: 600; outline: none; transition: 0.2s;
        }
        .input-group input:focus { border-color: var(--accent); }

        .btn-main {
            background-color: var(--accent); color: white; border: none;
            border-radius: 10px; padding: 12px; font-size: 13px; font-weight: 800;
            cursor: pointer; width: 100%; transition: 0.2s;
            box-shadow: 0 4px 10px -2px var(--accent);
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-main:disabled { opacity: 0.5; cursor: wait; transform: scale(0.98); }
        .btn-main:hover:not(:disabled) { background-color: var(--accent-hover); transform: translateY(-1px); }

        /* --- Sidebar --- */
        .sidebar {
            width: 280px; min-width: 280px; background-color: var(--surface);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            padding: 20px 12px; gap: 12px; transition: var(--transition);
        }
        .sidebar.minimized { width: 70px; min-width: 70px; padding: 20px 8px; }
        .sidebar.minimized .hide-mini { display: none !important; }
        .sidebar.minimized .show-mini-only { display: flex !important; align-items: center; justify-content: center; width: 100%; }
        .show-mini-only { display: none !important; }

        .notes-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .note-card {
            padding: 12px 14px; border-radius: 12px; cursor: pointer; border: 1px solid var(--border);
            background: var(--surface); transition: 0.2s;
        }
        .note-card:hover { background-color: var(--surface-hover); }
        .note-card.selected { border-color: var(--accent); border-width: 2px; background: var(--surface-hover); }
        .note-card-title { font-weight: 800; font-size: 13px; margin-bottom: 2px; }
        .note-card-desc { font-size: 11px; opacity: 0.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Editor --- */
        .editor-pane { flex-grow: 1; display: flex; flex-direction: column; background-color: var(--bg-color); position: relative; }
        .editor-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 30px; border-bottom: 1px solid var(--border); }
        .editor-body { flex-grow: 1; overflow-y: auto; display: flex; justify-content: center; }
        .editor-content { width: 100%; max-width: var(--max-editor-width); padding: 25px 20px; display: flex; flex-direction: column; }

        .input-title { font-size: 30px; font-weight: 900; background: transparent; border: none; outline: none; color: var(--text); width: 100%; letter-spacing: -1px; margin-bottom: 5px; }
        .input-tags { color: var(--accent); font-size: 12px; font-style: italic; background: transparent; border: none; outline: none; margin-bottom: 15px; }
        .textarea-content { flex-grow: 1; background: transparent; border: none; color: var(--text); font-size: 16px; resize: none; outline: none; line-height: 1.6; }

        .editor-footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 30px; border-top: 1px solid var(--border); }

        .btn-sec { 
            background: var(--surface); color: var(--text); border: 1px solid var(--border); 
            padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-sec:hover { border-color: var(--accent); background: var(--surface-hover); }

        /* --- Modais --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 9000;
        }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--surface); border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 380px; padding: 30px; box-shadow: var(--card-shadow); text-align: center; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; min-width: 100%; position: absolute; z-index: 50; }
            .editor-pane { width: 100%; position: absolute; transform: translateX(100%); transition: 0.4s ease; z-index: 60; }
            body.editor-open .editor-pane { transform: translateX(0); }
            body.editor-open #back-mobile { display: flex !important; }
        }
    </style>
</head>

    <script>
        /* =========================================================================
           CRYPTO ENGINE & STATE MANAGEMENT (MOBILE STABLE)
           ========================================================================= */
        const CryptoEngine = {
            IV_LEN: 12, SALT_LEN: 16, ITER: 100000,
            
            buf2b64(buf) {
                return btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
            },
            b642buf(b64) {
                return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
            },

            async deriveKey(password, salt) {
                const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
                return await crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: this.ITER, hash: "SHA-256" }, base, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
            },
            async encrypt(text, key) {
                const iv = crypto.getRandomValues(new Uint8Array(this.IV_LEN));
                const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(text));
                const blob = new Uint8Array(iv.length + cipher.byteLength);
                blob.set(iv); blob.set(new Uint8Array(cipher), iv.length);
                return this.buf2b64(blob);
            },
            async decrypt(b64, key) {
                const blob = this.b642buf(b64);
                const iv = blob.slice(0, this.IV_LEN);
                const data = blob.slice(this.IV_LEN);
                const raw = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
                return new TextDecoder().decode(raw);
            },
            async wrap(key, wrappingKey) {
                const raw = await crypto.subtle.exportKey("raw", key);
                const iv = crypto.getRandomValues(new Uint8Array(this.IV_LEN));
                const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, wrappingKey, raw);
                const blob = new Uint8Array(iv.length + cipher.byteLength);
                blob.set(iv); blob.set(new Uint8Array(cipher), iv.length);
                return this.buf2b64(blob);
            },
            async unwrap(b64, wrappingKey) {
                const blob = this.b642buf(b64);
                const iv = blob.slice(0, this.IV_LEN);
                const data = blob.slice(this.IV_LEN);
                const raw = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, wrappingKey, data);
                return crypto.subtle.importKey("raw", raw, "AES-GCM", true, ["encrypt", "decrypt"]);
            }
        };

        const State = { masterKey: null, notes: [], currentId: null, autoTimer: null, idleTimer: null, IDLE_LIMIT: 300000 };

        /* =========================================================================
           AUTH & NAVIGATION
           ========================================================================= */
        const Auth = {
            async setup() {
                const btn = document.getElementById('btn-do-setup');
                const p = document.getElementById('setup-pass').value;
                const c = document.getElementById('setup-conf').value;
                if(p !== c || p.length < 6) return UI.toast("Dados inválidos (mín. 6 carateres).");
                
                btn.disabled = true; btn.innerText = "A PROCESSAR...";
                
                try {
                    const masterKey = await crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
                    const salt = crypto.getRandomValues(new Uint8Array(16));
                    const wrapped = await CryptoEngine.wrap(masterKey, await CryptoEngine.deriveKey(p, salt));
                    const recCode = Array.from(crypto.getRandomValues(new Uint8Array(8))).map(b => b.toString(16).toUpperCase().padStart(2,'0')).join('-');
                    const wrappedRec = await CryptoEngine.wrap(masterKey, await CryptoEngine.deriveKey(recCode, salt));
                    
                    localStorage.setItem("vault_meta", `${CryptoEngine.buf2b64(salt)}:${wrapped}:${wrappedRec}`);
                    State.masterKey = masterKey;
                    UI.alert(`Cofre Criado`, `GUARDE ESTE CÓDIGO NUM LOCAL SEGURO:<br><br><b style="font-size:18px; color:var(--accent); font-family:monospace;">${recCode}</b>`, () => Auth.initApp());
                } catch(e) { UI.toast("Erro no setup."); console.error(e); }
                finally { btn.disabled = false; btn.innerText = "CRIAR AGORA"; }
            },
            async login() {
                const btn = document.getElementById('btn-do-login');
                const p = document.getElementById('login-pass').value;
                if(!p) return;

                btn.disabled = true; btn.innerText = "A DESBLOQUEAR...";
                
                setTimeout(async () => {
                    try {
                        const metaStr = localStorage.getItem("vault_meta");
                        if(!metaStr) throw new Error("Cofre não encontrado.");
                        
                        const meta = metaStr.split(":");
                        const salt = CryptoEngine.b642buf(meta[0]);
                        
                        const wrappingKey = await CryptoEngine.deriveKey(p, salt);
                        State.masterKey = await CryptoEngine.unwrap(meta[1], wrappingKey);
                        
                        Auth.initApp();
                    } catch(e) { UI.toast("Senha mestra incorreta."); console.error(e); }
                    finally { btn.disabled = false; btn.innerText = "DESBLOQUEAR"; }
                }, 50);
            },
            async recover() {
                const btn = document.getElementById('btn-do-recover');
                const code = document.getElementById('rec-code').value.trim().toUpperCase();
                const pass = document.getElementById('rec-pass').value;
                if(pass.length < 6) return UI.toast("Nova senha muito curta.");

                btn.disabled = true; btn.innerText = "A REPOR...";

                setTimeout(async () => {
                    try {
                        const meta = localStorage.getItem("vault_meta").split(":");
                        const salt = CryptoEngine.b642buf(meta[0]);
                        State.masterKey = await CryptoEngine.unwrap(meta[2], await CryptoEngine.deriveKey(code, salt));
                        const wrapped = await CryptoEngine.wrap(State.masterKey, await CryptoEngine.deriveKey(pass, salt));
                        localStorage.setItem("vault_meta", `${meta[0]}:${wrapped}:${meta[2]}`);
                        Auth.initApp();
                    } catch(e) { UI.toast("Código inválido."); }
                    finally { btn.disabled = false; btn.innerText = "REPOR ACESSO"; }
                }, 50);
            },
            initApp() { 
                UI.showScreen('screen-main'); 
                Vault.loadNotes(); 
                Auth.resetIdleTimer();
                document.body.addEventListener('mousemove', Auth.resetIdleTimer);
                document.body.addEventListener('keydown', Auth.resetIdleTimer);
            },
            logout() { 
                State.masterKey = null;
                State.notes = [];
                location.reload(); 
            },
            resetIdleTimer() {
                if(!State.masterKey) return;
                clearTimeout(State.idleTimer);
                State.idleTimer = setTimeout(() => Auth.logout(), State.IDLE_LIMIT);
            }
        };

        /* =========================================================================
           VAULT LOGIC
           ========================================================================= */
        const Vault = {
            async loadNotes() {
                State.notes = [];
                for(let i=0; i<localStorage.length; i++){
                    const k = localStorage.key(i);
                    if(k.startsWith("v_note_")){
                        try {
                            const raw = await CryptoEngine.decrypt(localStorage.getItem(k), State.masterKey);
                            State.notes.push({ id: k.replace("v_note_", ""), ...JSON.parse(raw) });
                        } catch(e) {}
                    }
                }
                UI.renderList();
            },
            async createNote() {
                const id = crypto.randomUUID();
                const note = { id, title: "", tags: "", content: "", pinned: false };
                State.notes.unshift(note);
                localStorage.setItem(`v_note_${id}`, await CryptoEngine.encrypt(JSON.stringify(note), State.masterKey));
                Vault.select(id);
                document.getElementById('note-title').focus();
            },
            select(id) {
                State.currentId = id;
                const n = State.notes.find(x => x.id === id);
                if(!n) return;
                document.getElementById('note-title').value = n.title;
                document.getElementById('note-tags').value = n.tags;
                document.getElementById('note-content').value = n.content;
                UI.renderList();
                UI.updateStats();
                if(window.innerWidth < 768) document.body.classList.add('editor-open');
            },
            autoSave() {
                clearTimeout(State.autoTimer);
                UI.updateStats();
                State.autoTimer = setTimeout(() => Vault.saveNote(false), 1500);
            },
            async saveNote(manual) {
                if(!State.currentId) return;
                const n = State.notes.find(x => x.id === State.currentId);
                if(!n) return;
                n.title = document.getElementById('note-title').value;
                n.tags = document.getElementById('note-tags').value;
                n.content = document.getElementById('note-content').value;
                localStorage.setItem(`v_note_${n.id}`, await CryptoEngine.encrypt(JSON.stringify(n), State.masterKey));
                UI.renderList();
                if(manual) UI.toast("Guardado.");
            },
            deleteNote() {
                if(!State.currentId) return;
                
                // Remover do armazenamento e do estado
                localStorage.removeItem(`v_note_${State.currentId}`);
                State.notes = State.notes.filter(x => x.id !== State.currentId);
                State.currentId = null;
                
                // CORREÇÃO: Limpar os campos do editor para não expor dados eliminados
                document.getElementById('note-title').value = "";
                document.getElementById('note-tags').value = "";
                document.getElementById('note-content').value = "";
                
                UI.renderList(); 
                UI.updateStats(); // Reduz contador de caracteres para 0
                UI.closeEditorMobile();
                UI.toast("Nota eliminada.");
            },
            togglePin() {
                const n = State.notes.find(x => x.id === State.currentId);
                if(n) { n.pinned = !n.pinned; Vault.saveNote(false); }
            },
            nuclearReset() {
                UI.confirm('⚠️ LIMPEZA TOTAL', 'Isto apagará permanentemente TODAS as suas notas e senhas mestras. Não há volta atrás.', () => {
                    localStorage.clear();
                    State.masterKey = null;
                    State.notes = [];
                    location.reload();
                });
            },
            openGen() {
                UI.customModal(`Gerador de Chaves`, `
                    <div id="gen-result" style="background:rgba(0,0,0,0.1); padding:15px; border-radius:12px; font-family:monospace; margin-bottom:15px; font-size:16px; word-break: break-all;">Gerando...</div>
                    <button class="btn-main" onclick="Vault.runGen()">REGERAR</button>
                `);
                Vault.runGen();
            },
            runGen() {
                const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=";
                let pass = "";
                const randomValues = new Uint32Array(24);
                crypto.getRandomValues(randomValues);
                for(let i=0; i<24; i++) pass += charset.charAt(randomValues[i] % charset.length);
                document.getElementById('gen-result').innerText = pass;
            },
            exportBackup() {
                const data = {};
                for(let i=0; i<localStorage.length; i++) data[localStorage.key(i)] = localStorage.getItem(localStorage.key(i));
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type:'application/json'}));
                a.download = "SECURE_VAULT_BACKUP.json"; a.click();
            },
            importBackup(e) {
                const r = new FileReader();
                r.onload = (ev) => {
                    try {
                        const d = JSON.parse(ev.target.result);
                        Object.keys(d).forEach(k => localStorage.setItem(k, d[k]));
                        location.reload();
                    } catch(err) { UI.toast("Backup inválido."); }
                };
                r.readAsText(e.target.files[0]);
            },
            exportCSV() {
                const n = State.notes.find(x => x.id === State.currentId);
                if(!n) return;
                const csv = `Título,Conteúdo\n"${n.title}","${n.content.replace(/"/g, '""')}"`;
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
                a.download = "nota.csv"; a.click();
            }
        };

        /* =========================================================================
           UI SYSTEM
           ========================================================================= */
        const UI = {
            showScreen(id) { 
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
                document.getElementById(id).classList.add('active'); 
            },
            renderList() {
                const query = document.getElementById('search-input').value.toLowerCase();
                const list = document.getElementById('notes-list');
                list.innerHTML = "";
                const filtered = State.notes.filter(n => n.title.toLowerCase().includes(query) || n.content.toLowerCase().includes(query)).sort((a,b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
                
                filtered.forEach(n => {
                    const div = document.createElement('div');
                    div.className = `note-card ${State.currentId === n.id ? 'selected' : ''}`;
                    div.onclick = () => Vault.select(n.id);
                    div.innerHTML = `<div class="note-card-title">${n.title || "Sem Título"} ${n.pinned ? '📌' : ''}</div><div class="note-card-desc">${n.content.substring(0, 30)}</div>`;
                    list.appendChild(div);
                });
            },
            toggleTheme() { 
                const current = document.documentElement.getAttribute('data-theme');
                document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark'); 
            },
            toggleSidebar() { document.getElementById('main-sidebar').classList.toggle('minimized'); },
            toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); },
            toast(msg) { 
                const t = document.createElement('div'); t.className = 'toast'; t.innerHTML = `🛡️ ${msg}`; 
                document.getElementById('toast-container').appendChild(t); 
                setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 2500); 
            },
            updateStats() { 
                const content = document.getElementById('note-content').value;
                document.getElementById('stats').innerText = `${content.length} CARATERES`; 
            },
            
            alert(title, msg, onOk) {
                const m = document.getElementById('modal-content');
                m.innerHTML = `<h3 style="margin-bottom:10px;">${title}</h3><p style="margin-bottom:20px; font-size:13px; opacity: 0.8;">${msg}</p><button class="btn-main" id="btn-alert-ok">OK</button>`;
                document.getElementById('btn-alert-ok').onclick = () => {
                    UI.closeModal();
                    if (typeof onOk === 'function') onOk();
                };
                document.getElementById('modal-overlay').classList.add('active');
            },
            confirm(title, msg, onYes) {
                const m = document.getElementById('modal-content');
                m.innerHTML = `<h3 style="margin-bottom:10px;">${title}</h3><p style="margin-bottom:20px; font-size:13px; opacity: 0.8;">${msg}</p><div style="display:flex; gap:10px;"><button class="btn-sec" id="btn-confirm-cancel">CANCELAR</button><button class="btn-main" style="background:var(--danger)" id="btn-confirm-yes">SIM</button></div>`;
                
                document.getElementById('btn-confirm-cancel').onclick = () => UI.closeModal();
                document.getElementById('btn-confirm-yes').onclick = () => { 
                    UI.closeModal(); 
                    if (typeof onYes === 'function') onYes(); 
                };
                document.getElementById('modal-overlay').classList.add('active');
            },
            customModal(title, html) {
                const m = document.getElementById('modal-content');
                m.innerHTML = `<h3 style="margin-bottom:15px;">${title}</h3>${html}<button class="btn-sec" style="margin-top:15px; width:100%; border:none;" id="btn-custom-modal-close">FECHAR</button>`;
                document.getElementById('btn-custom-modal-close').onclick = () => UI.closeModal();
                document.getElementById('modal-overlay').classList.add('active');
            },
            closeModal() { document.getElementById('modal-overlay').classList.remove('active'); },
            closeEditorMobile() { document.body.classList.remove('editor-open'); }
        };

        /* =========================================================================
           IMPRESSÃO SEGURA
           ========================================================================= */
        function printStyledPDF() {
            const titleInput = document.getElementById('note-title');
            const contentTextarea = document.getElementById('note-content');
            if (!titleInput || !contentTextarea) return;
            
            const title = titleInput.value.trim() || "Sem título";
            const content = contentTextarea.value.trim() || "";
            if (!content && !title) return UI.toast("Nada para imprimir.");

            const iframe = document.createElement('iframe');
            iframe.style.position = 'fixed'; iframe.style.width = '0'; iframe.style.height = '0';
            iframe.style.border = 'none'; document.body.appendChild(iframe);
            
            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(`
                <html>
                <head>
                    <style>
                        body { font-family: sans-serif; padding: 40px; line-height: 1.6; color: #111; }
                        h1 { border-bottom: 3px solid #f59e0b; padding-bottom: 10px; margin-bottom: 20px; font-size: 24pt; }
                        .content { font-size: 12pt; white-space: pre-wrap; }
                        .footer { margin-top: 50px; font-size: 9pt; color: #888; border-top: 1px solid #eee; padding-top: 10px; text-align: center; }
                    </style>
                </head>
                <body>
                    <h1>${title}</h1>
                    <div class="content">${content}</div>
                    <div class="footer">SECURE VAULT PRO • Gerado em: ${new Date().toLocaleString()}</div>
                </body>
                </html>
            `);
            doc.close();
            
            iframe.onload = () => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
                setTimeout(() => { if(document.body.contains(iframe)) document.body.removeChild(iframe); }, 1000);
            };
        }

        setInterval(() => {
            const time = new Date().toLocaleTimeString('pt-PT');
            if(document.getElementById('clock-auth')) document.getElementById('clock-auth').innerText = time;
            if(document.getElementById('clock-main')) document.getElementById('clock-main').innerText = time;
        }, 1000);

        window.onload = () => {
            if(localStorage.getItem("vault_meta")) document.getElementById('view-login').style.display = "block";
            else document.getElementById('view-setup').style.display = "block";
        };
    </script>
</body>
</html>
